<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" aria-labelledby="title">
  <title id="title">SPR Seal - Glowing Globe with Scales and SPR band</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F7EAC3" stop-opacity="0.55" />
      <stop offset="35%" stop-color="#C9A86A" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bandGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#F7EAC3" />
      <stop offset="100%" stop-color="#C9A86A" />
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feBlend in="SourceGraphic" in2="b" />
    </filter>
    <path id="bandPath" d="M80 18
      a62 62 0 1 1 0 124
      a62 62 0 1 1 0 -124" />
  </defs>

  <!-- background circle -->
  <rect width="160" height="160" rx="18" fill="#000" />

  <!-- glowing halo -->
  <circle cx="80" cy="72" r="54" fill="url(#glow)" filter="url(#softGlow)" />

  <!-- globe base -->
  <circle cx="80" cy="72" r="44" fill="#071018" stroke="#2A2A2A" stroke-width="2" />

  <!-- globe longitude/latitude lines -->
  <g stroke="#1F2A33" stroke-width="1" fill="none" opacity="0.9">
    <path d="M80 28 a44 44 0 0 1 0 88" />
    <path d="M80 116 a44 44 0 0 1 0 -88" />
    <path d="M36 72 a44 44 0 0 0 88 0" />
    <path d="M124 72 a44 44 0 0 0 -88 0" />
    <path d="M80 28 a28 28 0 0 1 0 88" stroke-opacity="0.6" />
    <path d="M52 48 a28 28 0 0 1 56 0" stroke-opacity="0.6" />
  </g>

  <!-- scales of justice (simplified) -->
  <g transform="translate(80,72)" fill="none" stroke="#F7EAC3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 -18 v-10" />
    <path d="M0 -28 h28" stroke-opacity="0.0" />
    <line x1="-18" y1="-28" x2="18" y2="-28" />
    <line x1="-18" y1="-28" x2="-6" y2="-6" />
    <line x1="18" y1="-28" x2="6" y2="-6" />
    <circle cx="-6" cy="-2" r="6" fill="#071018" stroke="#F7EAC3" />
    <circle cx="6" cy="-2" r="6" fill="#071018" stroke="#F7EAC3" />
    <line x1="-6" y1="4" x2="-6" y2="14" stroke-opacity="0.6" />
    <line x1="6" y1="4" x2="6" y2="14" stroke-opacity="0.6" />
  </g>

  <!-- band around globe with SPR text -->
  <g fill="none" stroke="url(#bandGrad)" stroke-width="4" stroke-linecap="round">
    <use href="#bandPath" fill="none" stroke-opacity="0.08" />
    <path d="M30 70 a50 50 0 0 0 100 4" stroke="url(#bandGrad)" stroke-width="6" fill="none" stroke-linecap="round" />
    <text font-family="Merriweather, Inter, serif" font-size="12" fill="#F7EAC3">
      <textPath href="#bandPath" startOffset="35%">SPR</textPath>
    </text>
  </g>

  <!-- subtle ring -->
  <circle cx="80" cy="72" r="58" fill="none" stroke="#1C1C1C" stroke-width="3" />

  <!-- caption -->
  <text x="80" y="150" font-family="Merriweather, Inter, serif" font-size="10" fill="#B4B0AA" text-anchor="middle">SOFTWARE PASSPORT REGISTRY</text>
</svg>
    <rect x="410" y="266" width="380" height="612" rx="30" fill="url(#book)" stroke="url(#gold)" stroke-width="6"/>
    <rect x="432" y="292" width="336" height="554" rx="15" fill="#0c111a" stroke="#cfa85a" stroke-width="2"/>
    <line x1="433" y1="330" x2="767" y2="330" stroke="#6f501d" stroke-width="2" opacity="0.7"/>
    <text x="600" y="404" text-anchor="middle" class="label" font-size="82">SPR</text>
    <text x="600" y="456" text-anchor="middle" class="small" font-size="31">SOFTWARE PASSPORT</text>
    <text x="600" y="494" text-anchor="middle" class="small" font-size="31">REGISTRY</text>
    <circle cx="600" cy="611" r="105" fill="#10151d" stroke="url(#gold)" stroke-width="9"/>
    <ellipse cx="600" cy="611" rx="82" ry="102" fill="none" stroke="#d4aa55" stroke-width="4" opacity="0.8"/>
    <path d="M505 611 H695 M600 506 C560 548 550 673 600 716 M600 506 C640 548 650 673 600 716" stroke="#d4aa55" stroke-width="4" fill="none" opacity="0.8"/>
    <path d="M520 574 C548 555 585 553 608 570 C634 590 664 584 691 566" stroke="#d4aa55" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M512 646 C548 626 582 638 614 654 C648 671 674 654 693 640" stroke="#d4aa55" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M600 676 L648 701 V744 Q648 772 600 798 Q552 772 552 744 V701 Z" fill="#10151d" stroke="url(#gold)" stroke-width="5"/>
    <path d="M578 733 L597 752 L626 714" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="600" y="815" text-anchor="middle" class="small" font-size="29">GLOBAL LEGAL BADGE</text>
    <text x="600" y="856" text-anchor="middle" class="micro" font-size="18">VERIFIED. TRUSTED. WORLDWIDE.</text>

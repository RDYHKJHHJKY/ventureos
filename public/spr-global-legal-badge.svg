      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <path d="M60 35 C35 36 35 83 60 84 C86 83 86 36 60 35 M60 43 V76 M45 50 H75 M42 60 H78 M45 70 H75" stroke="url(#gold)" stroke-width="4" fill="none"/>
      <text x="112" y="48" class="panelText" font-size="23">VERIFIED</text><text x="112" y="77" class="panelText" font-size="23">IDENTITY</text><text x="112" y="101" class="micro" font-size="14">CONFIRMED</text>
    </g>
    <g transform="translate(120 472)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <path d="M60 31 L95 51 V90 L60 109 L25 90 V51 Z M60 31 V70 M25 51 L60 70 L95 51" stroke="url(#gold)" stroke-width="5" fill="none"/>
      <text x="112" y="49" class="panelText" font-size="23">SOFTWARE</text><text x="112" y="78" class="panelText" font-size="23">LINEAGE</text><text x="112" y="102" class="micro" font-size="14">TRANSPARENT</text>
    </g>
    <g transform="translate(120 608)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <path d="M60 30 L100 49 V80 Q100 103 60 116 Q20 103 20 80 V49 Z" fill="url(#gold)"/><path d="M42 74 L56 88 L82 55" fill="none" stroke="#070707" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="57" class="panelText" font-size="24">TRUST SCORE</text><text x="112" y="91" class="micro" font-size="15">EVIDENCE-BASED</text>
    </g>
    <g transform="translate(120 744)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <circle cx="60" cy="61" r="31" fill="none" stroke="url(#gold)" stroke-width="6"/><path d="M60 38 V63 L78 76 M82 29 L100 29 L100 47" stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round"/>
      <text x="112" y="47" class="panelText" font-size="21">CONTINUOUS</text><text x="112" y="75" class="panelText" font-size="21">MONITORING</text><text x="112" y="100" class="micro" font-size="14">REAL-TIME</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(826 336)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <path d="M45 29 H86 L103 47 V94 H45 Z M85 29 V48 H103 M57 57 H88 M57 72 H92 M57 87 H83" stroke="url(#gold)" stroke-width="5" fill="none"/>
      <text x="118" y="48" class="panelText" font-size="21">LEGAL &amp;</text><text x="118" y="76" class="panelText" font-size="21">COMPLIANCE</text><text x="118" y="100" class="micro" font-size="13">GLOBAL STANDARDS</text>
    </g>
    <g transform="translate(826 472)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <circle cx="63" cy="61" r="38" fill="none" stroke="url(#gold)" stroke-width="5"/><path d="M25 61 H101 M63 23 C42 45 42 78 63 99 M63 23 C84 45 84 78 63 99" stroke="url(#gold)" stroke-width="4" fill="none"/>
      <text x="118" y="51" class="panelText" font-size="23">GLOBAL</text><text x="118" y="80" class="panelText" font-size="23">RECOGNITION</text><text x="118" y="103" class="micro" font-size="13">MULTI-JURISDICTION</text>
    </g>
    <g transform="translate(826 608)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <rect x="36" y="61" width="62" height="45" rx="7" fill="url(#gold)"/><path d="M48 61 V45 C48 20 87 20 87 45 V61" stroke="url(#gold)" stroke-width="10" fill="none"/><circle cx="67" cy="82" r="7" fill="#070707"/><path d="M67 87 V97" stroke="#070707" stroke-width="6"/>
      <text x="118" y="49" class="panelText" font-size="22">SECURE</text><text x="118" y="78" class="panelText" font-size="22">BY DESIGN</text><text x="118" y="102" class="micro" font-size="14">PRIVACY FIRST</text>
    </g>
    <g transform="translate(826 744)">
      <rect width="254" height="118" rx="15" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="5"/>
      <circle cx="63" cy="61" r="35" fill="none" stroke="url(#gold)" stroke-width="6"/><path d="M44 60 L59 75 L84 42" fill="none" stroke="url(#gold)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="118" y="57" class="panelText" font-size="24">AUDIT READY</text><text x="118" y="91" class="micro" font-size="15">ALWAYS</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <path d="M284 884 H916 Q942 884 950 908 L970 969 Q975 984 958 990 H242 Q225 984 230 969 L250 908 Q258 884 284 884Z" fill="url(#gold)" stroke="#674312" stroke-width="5"/>
    <text x="600" y="922" text-anchor="middle" class="darkText" font-size="25">EVIDENCE - TRANSPARENCY - TRUST</text>
    <g class="darkText" font-size="17" text-anchor="middle">
      <text x="350" y="973">ISO</text><text x="350" y="994" font-size="13">27001</text>
      <text x="475" y="973">SOC 2</text><text x="475" y="994" font-size="13">TYPE II</text>
      <text x="600" y="973">GDPR</text><text x="600" y="994" font-size="13">COMPLIANT</text>
      <text x="725" y="973">NIST</text><text x="725" y="994" font-size="13">FRAMEWORK</text>
      <text x="850" y="973">OECD</text><text x="850" y="994" font-size="13">ALIGNED</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <path d="M600 1014 L668 1049 V1118 Q668 1152 600 1186 Q532 1152 532 1118 V1049 Z" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="6"/>
    <text x="600" y="1073" text-anchor="middle" class="small" font-size="23">LEGAL</text>
    <text x="600" y="1104" text-anchor="middle" class="small" font-size="23">VALID</text>
    <text x="600" y="1133" text-anchor="middle" class="micro" font-size="15">GLOBALLY</text>
  </g>

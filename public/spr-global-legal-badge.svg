<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">SPR Global Legal Badge</title>
  <desc id="desc">Black and gold Software Passport Registry global legal badge with verification, lineage, trust score, compliance, global recognition, secure by design, and audit ready signals.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="46%" r="56%">
      <stop offset="0" stop-color="#2c2417"/>
      <stop offset="0.45" stop-color="#111111"/>
      <stop offset="1" stop-color="#050607"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1a6"/>
      <stop offset="0.2" stop-color="#d8ae55"/>
      <stop offset="0.52" stop-color="#9d6b22"/>
      <stop offset="0.72" stop-color="#f1cc69"/>
      <stop offset="1" stop-color="#7a4b13"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2028"/>
      <stop offset="0.46" stop-color="#090b10"/>
      <stop offset="1" stop-color="#151922"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2530"/>
      <stop offset="0.55" stop-color="#090c12"/>
      <stop offset="1" stop-color="#151a24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.62"/>
    </filter>
    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <path id="topArc" d="M 176 601 A 424 424 0 0 1 1024 601"/>
    <path id="bottomArc" d="M 1010 705 A 428 428 0 0 1 190 705"/>
    <style>
      .goldFill{fill:url(#gold)}
      .goldStroke{stroke:url(#gold);stroke-width:5;fill:none}
      .label{font-family:Inter,Arial,sans-serif;font-weight:900;letter-spacing:3px;fill:#f5cf70}
      .small{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:2px;fill:#f6d982}
      .micro{font-family:Inter,Arial,sans-serif;font-weight:800;letter-spacing:1.2px;fill:#f2d28b}
      .darkText{font-family:Inter,Arial,sans-serif;font-weight:900;letter-spacing:2px;fill:#0a0a0a}
      .panelText{font-family:Inter,Arial,sans-serif;font-weight:900;letter-spacing:1.2px;fill:#f2c965}
    </style>
  </defs>

  <rect width="1200" height="1200" fill="#07080b"/>
  <circle cx="600" cy="600" r="574" fill="url(#bgGlow)"/>
  <circle cx="600" cy="600" r="560" class="goldStroke" stroke-width="10"/>
  <circle cx="600" cy="600" r="522" fill="#080b11" stroke="url(#gold)" stroke-width="22"/>
  <circle cx="600" cy="600" r="468" fill="#15120b" stroke="url(#gold)" stroke-width="6"/>
  <circle cx="600" cy="600" r="445" fill="none" stroke="#4b3615" stroke-width="2"/>

  <text class="label" font-size="58" filter="url(#goldShadow)">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SPR GLOBAL LEGAL BADGE</textPath>
  </text>
  <text class="label" font-size="34" filter="url(#goldShadow)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">THE GLOBAL PASSPORT FOR SOFTWARE TRUST</textPath>
  </text>

  <g filter="url(#shadow)">
    <path d="M330 182 H870 Q895 182 908 204 L942 262 Q948 274 938 284 H262 Q252 274 258 262 L292 204 Q305 182 330 182Z" fill="url(#gold)" stroke="#5d3b13" stroke-width="4"/>
    <text x="390" y="246" class="darkText" font-size="26">VERIFIED</text>
    <text x="718" y="246" class="darkText" font-size="26">WORLDWIDE</text>
    <path d="M600 138 L674 176 V245 Q674 287 600 327 Q526 287 526 245 V176 Z" fill="url(#darkPanel)" stroke="url(#gold)" stroke-width="6"/>
    <path d="M570 225 L595 251 L646 190" fill="none" stroke="url(#gold)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

